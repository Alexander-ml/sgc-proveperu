services:

  database:
    image: postgres:16-alpine
    container_name: proveperu-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    ports:
      - "127.0.0.1:${DB_PORT_EXTERNAL}:${DB_PORT_INTERNAL}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - proveperu-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proveperu-backend
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT_INTERNAL}
      
      BACKEND_PORT: ${BACKEND_PORT}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      TZ: ${TZ}
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:${BACKEND_PORT}/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - proveperu-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proveperu-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
      - "443:443"
    volumes:
      - ./frontend/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - proveperu-network

volumes:
  postgres_data:
    name: proveperu-postgres-data

networks:
  proveperu-network:
    name: proveperu-network
    driver: bridge